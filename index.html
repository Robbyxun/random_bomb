<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新年抽獎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 35px;
        }
        
        .header h1 {
            font-size: 42px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: 800;
        }
        
        .header p {
            font-size: 16px;
            color: #999;
        }
        
        .input-group {
            margin-bottom: 30px;
        }
        
        .player-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s;
        }
        
        .player-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .prize-display-box {
            background: linear-gradient(135deg, #f5f7fa, #e9ecef);
            border-radius: 20px;
            padding: 40px 30px;
            margin-bottom: 30px;
            text-align: center;
            border: 3px solid #667eea;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .prize-emoji {
            font-size: 100px;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease-in;
        }
        
        .prize-name {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .prize-message {
            font-size: 14px;
            color: #999;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .prizes-grid {
            background: #f5f5f5;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .prizes-title {
            font-size: 14px;
            color: #999;
            margin-bottom: 15px;
            font-weight: 600;
            text-align: center;
        }
        
        .prizes-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .prize-item {
            background: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 2px solid #e0e0e0;
            transition: all 0.3s;
        }
        
        .prize-item:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }
        
        .prize-item.empty {
            opacity: 0.5;
            background: #f9f9f9;
        }
        
        .prize-emoji-small {
            font-size: 40px;
            margin-bottom: 8px;
        }
        
        .prize-name-small {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }
        
        .prize-count {
            font-size: 16px;
            font-weight: 800;
            color: #667eea;
            padding: 6px 12px;
            background: #f0f5ff;
            border-radius: 20px;
            display: inline-block;
        }
        
        .prize-count.empty {
            color: #ccc;
            background: #f0f0f0;
            text-decoration: line-through;
        }
        
        .message {
            text-align: center;
            font-size: 14px;
            color: #666;
            min-height: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 0;
        }
        
        .btn {
            flex: 1;
            padding: 18px 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-primary:active:not(:disabled) {
            transform: scale(0.95);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        .history {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
        }
        
        .history-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
            font-weight: 600;
            text-align: center;
        }
        
        .history-item {
            font-size: 13px;
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .popup.show {
            display: flex;
        }
        
        .popup-card {
            background: white;
            padding: 60px 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 350px;
            animation: popUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popUp {
            from {
                transform: scale(0.5) translateY(100px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }
        
        .popup-emoji {
            font-size: 90px;
            margin-bottom: 20px;
            animation: bounce 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-40px); }
        }
        
        .popup-title {
            font-size: 32px;
            font-weight: 800;
            color: #333;
            margin-bottom: 15px;
        }
        
        .popup-prize {
            font-size: 28px;
            font-weight: 900;
            color: #667eea;
            margin-bottom: 15px;
        }
        
        .popup-player {
            font-size: 16px;
            color: #999;
            margin-bottom: 25px;
        }
        
        .close-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 14px 40px;
            border: none;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎉 新年抽獎</h1>
        <p>幸運就在眼前</p>
    </div>
    
    <div class="input-group">
        <input 
            type="text" 
            class="player-input" 
            id="playerName" 
            placeholder="輸入你的名字" 
            maxlength="10"
        >
    </div>
    
    <div class="prize-display-box">
        <div class="prize-emoji" id="prizeEmoji">🎁</div>
        <div class="prize-name" id="prizeName">準備好了</div>
        <div class="prize-message" id="prizeMessage">點擊下方「開始抽獎」</div>
    </div>
    
    <div class="message" id="message">輸入名字後開始抽獎</div>
    
    <div class="button-group">
        <button class="btn btn-primary" id="playBtn" onclick="playGame()" disabled>開始抽獎</button>
        <button class="btn btn-secondary" onclick="resetGame()">重置</button>
    </div>
    
    <div class="prizes-grid">
        <div class="prizes-title">剩餘獎品</div>
        <div class="prizes-list" id="prizesList">
            <!-- 動態生成 -->
        </div>
    </div>
    
    <div class="history">
        <div class="history-title">最近獲獎</div>
        <div id="historyList">還沒有人抽獎呢</div>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-card">
        <div class="popup-emoji" id="popupEmoji">🎉</div>
        <div class="popup-title">恭喜！</div>
        <div class="popup-player" id="popupPlayer">你</div>
        <div class="popup-prize" id="popupPrize">獲得獎品</div>
        <button class="close-btn" onclick="closePopup()">繼續抽獎</button>
    </div>
</div>

<script>
    const initialPrizes = [
        { name: '1000元禮券', emoji: '💵', count: 2 },
        { name: '500元禮券', emoji: '💴', count: 1 },
        { name: '玩偶', emoji: '🧸', count: 2 },
        { name: '咖啡禮券', emoji: '☕', count: 2 }
    ];
    
    let gameState = {
        prizes: JSON.parse(JSON.stringify(initialPrizes)),
        history: [],
        isPlaying: false
    };
    
    function renderPrizes() {
        const list = document.getElementById('prizesList');
        list.innerHTML = '';
        
        gameState.prizes.forEach(prize => {
            const item = document.createElement('div');
            item.className = 'prize-item' + (prize.count === 0 ? ' empty' : '');
            item.innerHTML = `
                <div class="prize-emoji-small">${prize.emoji}</div>
                <div class="prize-name-small">${prize.name}</div>
                <div class="prize-count ${prize.count === 0 ? 'empty' : ''}">
                    ${prize.count > 0 ? prize.count + '份' : '已滿'}
                </div>
            `;
            list.appendChild(item);
        });
    }
    
    function renderHistory() {
        const list = document.getElementById('historyList');
        if (gameState.history.length === 0) {
            list.innerHTML = '<div style="color: #ccc; text-align: center; padding: 20px 0;">還沒有人抽獎呢</div>';
        } else {
            list.innerHTML = gameState.history.map((h, i) => `
                <div class="history-item">
                    ${gameState.history.length - i}. ${h.name} 抽到 ${h.emoji} ${h.prize}
                </div>
            `).join('');
        }
    }
    
    function updatePlayButton() {
        const btn = document.getElementById('playBtn');
        const name = document.getElementById('playerName').value.trim();
        const hasAvailablePrizes = gameState.prizes.some(p => p.count > 0);
        
        if (name && hasAvailablePrizes && !gameState.isPlaying) {
            btn.disabled = false;
            document.getElementById('message').textContent = '點擊「開始抽獎」';
        } else if (!hasAvailablePrizes) {
            btn.disabled = true;
            document.getElementById('message').textContent = '獎品已全部領取！';
        } else {
            btn.disabled = true;
            document.getElementById('message').textContent = '輸入名字後開始抽獎';
        }
    }
    
    document.getElementById('playerName').addEventListener('input', updatePlayButton);
    
    function playGame() {
        const playerName = document.getElementById('playerName').value.trim();
        
        if (!playerName || gameState.isPlaying) return;
        
        const availablePrizes = gameState.prizes.filter(p => p.count > 0);
        if (availablePrizes.length === 0) {
            document.getElementById('message').textContent = '獎品已全部領取！';
            return;
        }
        
        gameState.isPlaying = true;
        document.getElementById('playBtn').disabled = true;
        document.getElementById('message').textContent = '抽獎中...';
        
        // 抽獎動畫 - 快速切換表情
        const emojis = ['🎪', '🎭', '🎨', '🎬', '🎮', '🎯', '🎲', '🎰'];
        let emojiIndex = 0;
        const emojiInterval = setInterval(() => {
            document.getElementById('prizeEmoji').textContent = emojis[emojiIndex % emojis.length];
            document.getElementById('prizeName').textContent = '抽獎中...';
            emojiIndex++;
        }, 100);
        
        // 2秒後顯示結果
        setTimeout(() => {
            clearInterval(emojiInterval);
            
            // 隨機選擇獎品
            const randomIndex = Math.floor(Math.random() * availablePrizes.length);
            const selectedPrize = availablePrizes[randomIndex];
            
            // 扣除庫存
            for (let p of gameState.prizes) {
                if (p.name === selectedPrize.name) {
                    p.count--;
                    break;
                }
            }
            
            // 記錄到歷史
            gameState.history.unshift({
                name: playerName,
                prize: selectedPrize.name,
                emoji: selectedPrize.emoji
            });
            
            // 更新顯示框
            document.getElementById('prizeEmoji').textContent = selectedPrize.emoji;
            document.getElementById('prizeName').textContent = selectedPrize.name;
            document.getElementById('prizeMessage').textContent = `${playerName} 獲得`;
            document.getElementById('message').textContent = `恭喜 ${playerName}！`;
            
            // 顯示彈窗
            showWinPopup(playerName, selectedPrize);
            
            // 更新列表
            renderPrizes();
            renderHistory();
            
            gameState.isPlaying = false;
            updatePlayButton();
        }, 2000);
    }
    
    function showWinPopup(playerName, prize) {
        document.getElementById('popupEmoji').textContent = prize.emoji;
        document.getElementById('popupPlayer').textContent = `${playerName} 獲得`;
        document.getElementById('popupPrize').textContent = prize.name;
        document.getElementById('popup').classList.add('show');
    }
    
    function closePopup() {
        document.getElementById('popup').classList.remove('show');
        document.getElementById('playerName').focus();
    }
    
    function resetGame() {
        if (confirm('確定要重置遊戲嗎？所有獎品庫存會恢復。')) {
            gameState.prizes = JSON.parse(JSON.stringify(initialPrizes));
            gameState.history = [];
            document.getElementById('playerName').value = '';
            document.getElementById('prizeEmoji').textContent = '🎁';
            document.getElementById('prizeName').textContent = '準備好了';
            document.getElementById('prizeMessage').textContent = '點擊下方「開始抽獎」';
            renderPrizes();
            renderHistory();
            updatePlayButton();
        }
    }
    
    // 初始化
    renderPrizes();
    renderHistory();
</script>

</body>
</html>
