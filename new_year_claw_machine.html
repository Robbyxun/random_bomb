<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>新年抽獎機</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .header h1 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 5px;
            font-weight: 800;
        }
        
        .header p {
            font-size: 16px;
            color: #999;
        }
        
        .machine-display {
            background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .machine-window {
            width: 100%;
            height: 200px;
            background: white;
            border-radius: 15px;
            border: 3px solid #667eea;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .prize-display {
            font-size: 100px;
            transition: none;
        }
        
        .prize-display.spinning {
            animation: bounce-spin 2s ease-out;
        }
        
        @keyframes bounce-spin {
            0% { 
                transform: scale(0.3) rotate(0deg);
                opacity: 0;
            }
            30% { 
                transform: scale(1.3) rotate(180deg);
            }
            60% { 
                transform: scale(1.1) rotate(360deg);
            }
            100% { 
                transform: scale(1) rotate(360deg);
                opacity: 1;
            }
        }
        
        .machine-status {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }
        
        .prizes-grid {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 25px;
        }
        
        .prizes-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .prizes-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .prize-item {
            background: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #e0e0e0;
        }
        
        .prize-item.empty {
            opacity: 0.5;
            background: #f9f9f9;
        }
        
        .prize-emoji {
            font-size: 32px;
            margin-bottom: 5px;
        }
        
        .prize-name {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .prize-count {
            font-size: 14px;
            font-weight: 800;
            color: #667eea;
        }
        
        .prize-count.empty {
            color: #ccc;
            text-decoration: line-through;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-primary:hover {
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }
        
        .btn-primary:active {
            transform: scale(0.95);
        }
        
        .btn-primary.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #667eea;
        }
        
        .btn-secondary:hover {
            background: #e8e8e8;
        }
        
        .message {
            text-align: center;
            font-size: 14px;
            color: #999;
            min-height: 20px;
            margin-bottom: 15px;
        }
        
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        
        .popup.show {
            display: flex;
        }
        
        .popup-card {
            background: white;
            padding: 50px 40px;
            border-radius: 25px;
            text-align: center;
            max-width: 350px;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .popup-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
        
        .popup-title {
            font-size: 28px;
            font-weight: 800;
            color: #333;
            margin-bottom: 15px;
        }
        
        .popup-prize {
            font-size: 24px;
            font-weight: 900;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .popup-text {
            font-size: 14px;
            color: #999;
        }
        
        .close-btn {
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: #764ba2;
        }
        
        .player-name {
            text-align: center;
            margin-bottom: 15px;
        }
        
        .player-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
        }
        
        .player-input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .history {
            background: #f5f5f5;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .history-title {
            font-size: 12px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 600;
        }
        
        .history-item {
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #666;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🎪 新年夾娃娃機</h1>
        <p>試試你的手氣！</p>
    </div>
    
    <div class="player-name">
        <input type="text" class="player-input" id="playerName" placeholder="輸入你的名字" maxlength="10">
    </div>
    
    <div class="machine-display">
        <div class="machine-window">
            <div class="prize-display" id="prizeDisplay">🎁</div>
        </div>
        <div class="machine-status" id="machineStatus">準備就緒</div>
    </div>
    
    <div class="prizes-grid">
        <div class="prizes-title">獎品庫存</div>
        <div class="prizes-list" id="prizesList">
            <!-- 動態生成 -->
        </div>
    </div>
    
    <div class="history">
        <div class="history-title">最近獲獎</div>
        <div id="historyList">還沒有人抽獎呢</div>
    </div>
    
    <div class="message" id="message">輸入名字後點擊「開始夾娃娃」</div>
    
    <div class="button-group">
        <button class="btn btn-primary" id="playBtn" onclick="playGame()" disabled>開始夾娃娃</button>
        <button class="btn btn-secondary" onclick="resetGame()">重置遊戲</button>
    </div>
</div>

<div class="popup" id="popup">
    <div class="popup-card">
        <div class="popup-emoji" id="popupEmoji">🎉</div>
        <div class="popup-title">恭喜！</div>
        <div class="popup-text">你抽到了</div>
        <div class="popup-prize" id="popupPrize">大獎</div>
        <button class="close-btn" onclick="closePopup()">繼續遊玩</button>
    </div>
</div>

<script>
    // 獎品池設定
    const initialPrizes = [
        { name: '1000元', emoji: '💵', count: 2 },
        { name: '500元', emoji: '💴', count: 1 },
        { name: '玩偶', emoji: '🧸', count: 3 },
        { name: '咖啡禮券', emoji: '☕', count: 2 }
    ];
    
    let gameState = {
        prizes: [],
        history: [],
        isPlaying: false
    };
    
    function initGame() {
        gameState.prizes = JSON.parse(JSON.stringify(initialPrizes));
        gameState.history = [];
        renderPrizes();
        renderHistory();
        document.getElementById('playerName').value = '';
        document.getElementById('playerName').focus();
        document.getElementById('message').textContent = '輸入名字後點擊「開始夾娃娃」';
        updatePlayButton();
    }
    
    function renderPrizes() {
        const list = document.getElementById('prizesList');
        list.innerHTML = '';
        
        gameState.prizes.forEach(prize => {
            const item = document.createElement('div');
            item.className = 'prize-item' + (prize.count === 0 ? ' empty' : '');
            item.innerHTML = `
                <div class="prize-emoji">${prize.emoji}</div>
                <div class="prize-name">${prize.name}</div>
                <div class="prize-count ${prize.count === 0 ? 'empty' : ''}">
                    ${prize.count > 0 ? prize.count + '份' : '已滿'}
                </div>
            `;
            list.appendChild(item);
        });
    }
    
    function renderHistory() {
        const list = document.getElementById('historyList');
        if (gameState.history.length === 0) {
            list.innerHTML = '<div style="color: #ccc; text-align: center;">還沒有人抽獎呢</div>';
        } else {
            list.innerHTML = gameState.history.map((h, i) => `
                <div class="history-item">${gameState.history.length - i}. ${h.name} 抽到 ${h.emoji} ${h.prize}</div>
            `).join('');
        }
    }
    
    function updatePlayButton() {
        const btn = document.getElementById('playBtn');
        const name = document.getElementById('playerName').value.trim();
        const hasAvailablePrizes = gameState.prizes.some(p => p.count > 0);
        
        if (name && hasAvailablePrizes && !gameState.isPlaying) {
            btn.disabled = false;
        } else if (!hasAvailablePrizes) {
            btn.disabled = true;
            btn.classList.add('disabled');
            document.getElementById('message').textContent = '獎品已全部領取！';
        } else {
            btn.disabled = true;
            btn.classList.remove('disabled');
        }
    }
    
    document.getElementById('playerName').addEventListener('input', updatePlayButton);
    
    function playGame() {
        const playerName = document.getElementById('playerName').value.trim();
        
        if (!playerName) {
            document.getElementById('message').textContent = '請輸入你的名字';
            return;
        }
        
        if (gameState.isPlaying) return;
        
        gameState.isPlaying = true;
        document.getElementById('playBtn').disabled = true;
        document.getElementById('message').textContent = '夾娃娃中...';
        document.getElementById('machineStatus').textContent = '夾娃娃中...';
        
        // 重置動畫狀態
        const prizeDisplay = document.getElementById('prizeDisplay');
        prizeDisplay.classList.remove('spinning');
        
        // 先改變表情進行動畫
        const emojis = ['🎪', '🎭', '🎨', '🎬', '🎮', '🎯', '🎲', '🎰'];
        let emojiIndex = 0;
        const emojiInterval = setInterval(() => {
            prizeDisplay.textContent = emojis[emojiIndex % emojis.length];
            emojiIndex++;
        }, 150);
        
        // 動畫持續 2 秒
        setTimeout(() => {
            clearInterval(emojiInterval);
            
            const availablePrizes = gameState.prizes.filter(p => p.count > 0);
            
            if (availablePrizes.length === 0) {
                document.getElementById('message').textContent = '獎品已全部領取！';
                gameState.isPlaying = false;
                updatePlayButton();
                return;
            }
            
            // 隨機選擇一個獎品
            const randomPrize = availablePrizes[Math.floor(Math.random() * availablePrizes.length)];
            
            // 扣除庫存
            for (let p of gameState.prizes) {
                if (p.name === randomPrize.name) {
                    p.count--;
                    break;
                }
            }
            
            // 記錄到歷史
            gameState.history.unshift({
                name: playerName,
                prize: randomPrize.name,
                emoji: randomPrize.emoji
            });
            
            // 更新顯示並觸發動畫
            prizeDisplay.textContent = randomPrize.emoji;
            prizeDisplay.classList.add('spinning');
            
            document.getElementById('machineStatus').textContent = '成功！';
            document.getElementById('message').textContent = `${playerName} 抽到 ${randomPrize.name}！`;
            
            // 顯示彈出視窗
            showWinPopup(playerName, randomPrize);
            
            // 更新列表
            renderPrizes();
            renderHistory();
            
            gameState.isPlaying = false;
            updatePlayButton();
        }, 2000);
    }
    
    function showWinPopup(playerName, prize) {
        document.getElementById('popupEmoji').textContent = prize.emoji;
        document.getElementById('popupPrize').textContent = `${playerName}\n抽到 ${prize.name}`;
        document.getElementById('popup').classList.add('show');
    }
    
    function closePopup() {
        document.getElementById('popup').classList.remove('show');
        document.getElementById('playerName').focus();
    }
    
    function resetGame() {
        if (confirm('確定要重置遊戲嗎？所有獎品庫存會恢復。')) {
            initGame();
        }
    }
    
    // 初始化
    initGame();
</script>

</body>
</html>
